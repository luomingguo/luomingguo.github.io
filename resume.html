<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>罗明国 — 后端 / 全栈开发工程师 · 简历</title>

	<!-- ============================================================
	     这是一份「打印用」的中文 A4 简历，独立于网站首页。
	     要修改内容：只改下面 <script id="resume-data"> 里的 data 对象即可，
	     不用动 HTML 结构或 CSS。改完刷新页面 → Ctrl/Cmd+P → 另存为 PDF。
	     右上角「紧凑 / 标准」可微调密度，帮你把简历压进 1~2 页。
	     ============================================================ -->

	<style>
		/* ---------- A4 页面设置 ---------- */
		@page {
			size: A4;
			margin: 12mm 14mm;
		}

		:root {
			--ink: #1d2530;
			--soft: #44505f;
			--mute: #6b7686;
			--line: #d7dce3;
			--accent: #1a3c6e;
			/* 密度变量：紧凑模式会被 JS 覆盖 */
			--gap-section: 16px;
			--gap-item: 11px;
			--lh: 1.5;
			--fs: 13.5px;
		}

		* { box-sizing: border-box; }

		html, body { margin: 0; padding: 0; }

		body {
			font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Source Han Sans SC", "Noto Sans CJK SC", sans-serif;
			color: var(--ink);
			background: #eef0f3;
			font-size: var(--fs);
			line-height: var(--lh);
		}

		/* 屏幕上模拟 A4 纸张 */
		.page {
			width: 210mm;
			min-height: 297mm;
			margin: 18px auto;
			padding: 16mm 16mm 14mm;
			background: #fff;
			box-shadow: 0 4px 24px rgba(0, 0, 0, .12);
		}

		/* ---------- 工具条（仅屏幕显示） ---------- */
		.toolbar {
			position: sticky;
			top: 0;
			z-index: 10;
			display: flex;
			gap: 8px;
			justify-content: center;
			align-items: center;
			padding: 10px;
			background: rgba(255, 255, 255, .85);
			backdrop-filter: blur(6px);
			border-bottom: 1px solid var(--line);
		}
		.toolbar button, .toolbar a {
			font: inherit;
			font-size: 13px;
			padding: 7px 14px;
			border-radius: 8px;
			border: 1px solid var(--line);
			background: #fff;
			color: var(--ink);
			cursor: pointer;
			text-decoration: none;
		}
		.toolbar button:hover, .toolbar a:hover { border-color: var(--accent); color: var(--accent); }
		.toolbar .primary { background: var(--accent); color: #fff; border-color: var(--accent); }
		.toolbar .hint { font-size: 12px; color: var(--mute); margin-left: 6px; }

		/* ---------- 头部 ---------- */
		.r-head { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: var(--gap-section); }
		.r-name { font-size: 1.9em; font-weight: 800; letter-spacing: 1px; margin: 0; }
		.r-name .intent { font-size: .52em; font-weight: 600; color: var(--accent); margin-left: 12px; letter-spacing: 0; }
		.r-contact { margin-top: 6px; color: var(--soft); font-size: .92em; display: flex; flex-wrap: wrap; gap: 4px 16px; }
		.r-contact a { color: var(--soft); text-decoration: none; }

		/* ---------- 区块标题 ---------- */
		.section { margin-bottom: var(--gap-section); }
		.section-title {
			font-size: 1.08em;
			font-weight: 800;
			color: var(--accent);
			border-bottom: 1px solid var(--line);
			padding-bottom: 4px;
			margin: 0 0 9px;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.section-title::before {
			content: "";
			width: 4px; height: 14px;
			background: var(--accent);
			border-radius: 2px;
		}

		/* ---------- 自我评价 ---------- */
		.summary { color: var(--soft); margin: 0; }

		/* ---------- 技能 ---------- */
		.skills { margin: 0; }
		.skill-row { display: flex; margin-bottom: 4px; }
		.skill-k { flex: 0 0 6.5em; font-weight: 700; color: var(--ink); }
		.skill-v { color: var(--soft); }

		/* ---------- 经历条目 ---------- */
		.item { margin-bottom: var(--gap-item); break-inside: avoid; }
		.item:last-child { margin-bottom: 0; }
		.item-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
		.item-title { font-weight: 700; font-size: 1.02em; }
		.item-org { color: var(--accent); font-weight: 600; }
		.item-meta { color: var(--soft); font-weight: 400; font-size: .92em; }
		.item-date { color: var(--mute); font-size: .9em; white-space: nowrap; flex-shrink: 0; }
		.item-sub { color: var(--soft); font-size: .92em; margin: 1px 0 5px; }
		.points { margin: 4px 0 0; padding-left: 0; list-style: none; }
		.points li { position: relative; padding-left: 14px; margin-bottom: 3px; color: var(--soft); }
		.points li::before { content: "·"; position: absolute; left: 3px; color: var(--accent); font-weight: 900; }
		.points li b { color: var(--ink); font-weight: 700; }
		.honor { color: var(--ink); }
		.repo { color: var(--mute); font-size: .9em; font-weight: 400; }

		/* ---------- 打印 ---------- */
		@media print {
			body { background: #fff; font-size: 10.8pt; }
			.toolbar { display: none !important; }
			.page { width: auto; min-height: 0; margin: 0; padding: 0; box-shadow: none; }
			a { color: inherit; }
			.section { break-inside: avoid-page; }
		}
	</style>
</head>

<body>

	<script>
		/* ---------- 渲染器：把 data 渲染成 A4 简历，无需手写 HTML ---------- */
		(function () {
			function esc(s) { return s == null ? "" : s; }

			function pointsHtml(points) {
				if (!points || !points.length) return "";
				return '<ul class="points">' +
					points.map(function (p) { return "<li>" + p + "</li>"; }).join("") +
					"</ul>";
			}

			function workItem(it) {
				return '<div class="item">' +
					'<div class="item-head">' +
						'<div class="item-title"><span class="item-org">' + esc(it.org) + '</span>' +
						(it.role ? ' <span class="item-meta">· ' + esc(it.role) + '</span>' : '') + '</div>' +
						'<div class="item-date">' + esc(it.date) + '</div>' +
					'</div>' +
					pointsHtml(it.points) +
				'</div>';
			}

			function projItem(it) {
				return '<div class="item">' +
					'<div class="item-head">' +
						'<div class="item-title">' + esc(it.name) +
						(it.repo ? ' <span class="repo">· ' + esc(it.repo) + '</span>' : '') + '</div>' +
						(it.date ? '<div class="item-date">' + esc(it.date) + '</div>' : '') +
					'</div>' +
					pointsHtml(it.points) +
				'</div>';
			}

			function eduItem(it) {
				return '<div class="item">' +
					'<div class="item-head">' +
						'<div class="item-title"><span class="item-org">' + esc(it.org) + '</span>' +
						(it.role ? ' <span class="item-meta">· ' + esc(it.role) + '</span>' : '') + '</div>' +
						'<div class="item-date">' + esc(it.date) + '</div>' +
					'</div>' +
					pointsHtml(it.points) +
				'</div>';
			}

			function section(title, inner) {
				return '<div class="section"><h2 class="section-title">' + title + '</h2>' + inner + '</div>';
			}

			var head =
				'<div class="r-head">' +
					'<h1 class="r-name">' + esc(data.name) +
						(data.intent ? '<span class="intent">求职意向：' + esc(data.intent) + '</span>' : '') +
					'</h1>' +
					'<div class="r-contact">' +
						data.contacts.map(function (c) {
							return c.link
								? '<a href="' + c.link + '">' + esc(c.label) + '</a>'
								: '<span>' + esc(c.label) + '</span>';
						}).join('') +
					'</div>' +
				'</div>';

			var html = head;
			if (data.summary) html += section("自我评价", '<p class="summary">' + data.summary + '</p>');
			if (data.skills) html += section("专业技能",
				'<div class="skills">' + data.skills.map(function (s) {
					return '<div class="skill-row"><div class="skill-k">' + esc(s.k) + '</div><div class="skill-v">' + esc(s.v) + '</div></div>';
				}).join('') + '</div>');
			if (data.work) html += section("工作经历", data.work.map(workItem).join(''));
			if (data.projects) html += section("项目经历", data.projects.map(projItem).join(''));
			if (data.education) html += section("教育背景", data.education.map(eduItem).join(''));

			document.getElementById("page").innerHTML = html;

			/* ---------- 工具条交互 ---------- */
			document.getElementById("printBtn").addEventListener("click", function () { window.print(); });

			var root = document.documentElement;
			var compact = localStorage.getItem("resume-compact") === "1";
			var btn = document.getElementById("densityBtn");
			function applyDensity() {
				if (compact) {
					root.style.setProperty("--gap-section", "11px");
					root.style.setProperty("--gap-item", "7px");
					root.style.setProperty("--lh", "1.4");
					root.style.setProperty("--fs", "12.8px");
					btn.textContent = "标准模式";
				} else {
					root.style.removeProperty("--gap-section");
					root.style.removeProperty("--gap-item");
					root.style.removeProperty("--lh");
					root.style.removeProperty("--fs");
					btn.textContent = "紧凑模式";
				}
			}
			btn.addEventListener("click", function () {
				compact = !compact;
				localStorage.setItem("resume-compact", compact ? "1" : "0");
				applyDensity();
			});
			applyDensity();
		})();
	</script>
</body>

</html>
